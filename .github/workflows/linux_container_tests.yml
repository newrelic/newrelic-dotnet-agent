name: Linux Container Integration Tests

on:
  workflow_call:
    inputs:
      external_call:
        type: boolean
        default: true
        required: false
      aggregate_payload_data:
        type: boolean
        default: false
        required: false
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build workflow (all_solutions.yml) to use the agent from. ID can be found in URL for run.'
        required: true
      aggregate_payload_data:
        description: 'Build and aggregate payload data'
        type: boolean
        default: false
        required: false

env:
  DOTNET_NOLOGO: true
  NR_DEV_BUILD_HOME: false
  # Static list of all Distro trait values present in Container Integration Tests
  CONTAINER_TEST_DISTROS: Debian,Ubuntu,Alpine,Centos,Amazon,Fedora


# only allow one instance of this workflow to be running per PR or branch, cancels any that are already running
concurrency:
  group: linux-container-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  linux-container-tests:
    name: Container Test (${{ matrix.distro }}/${{ matrix.arch }})
    # Runner chosen per matrix entry
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # amd64 distros (all test types)
          - arch: amd64
            distro: Debian
            runner: ubuntu-latest
          - arch: amd64
            distro: Ubuntu
            runner: ubuntu-latest
          - arch: amd64
            distro: Alpine
            runner: ubuntu-latest
          - arch: amd64
            distro: Centos
            runner: ubuntu-latest
          - arch: amd64
            distro: Amazon
            runner: ubuntu-latest
          - arch: amd64
            distro: Fedora
            runner: ubuntu-latest
          # arm64 distros (subset of tests implemented)
          - arch: arm64
            distro: Debian
            runner: ubuntu-24.04-arm
          - arch: arm64
            distro: Ubuntu
            runner: ubuntu-24.04-arm
          - arch: arm64
            distro: Amazon
            runner: ubuntu-24.04-arm
          - arch: arm64
            distro: Fedora
            runner: ubuntu-24.04-arm

    env:
      test_results_path: tests/TestResults
      integration_tests_shared_project: ${{ github.workspace }}/tests/Agent/IntegrationTests/Shared
      NR_DOTNET_TEST_SAVE_WORKING_DIRECTORY: 1
      # Make this variable true to enable extra data-gathering and logging to help troubleshoot test failures, at the cost of additional time and resources
      enhanced_logging: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download Agent Home Folders (Call)
        if: ${{ inputs.external_call }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: homefolders
          path: src/Agent

      - name: Download Agent Home Folders (Dispatch)
        if: ${{ !inputs.external_call }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}
          name: homefolders
          path: ${{ github.workspace }}/src/Agent
          repository: ${{ github.repository }}

      - name: Set up secrets
        env:
          INTEGRATION_TEST_SECRETS: ${{ secrets.TEST_SECRETS }}
        run: |
          echo $INTEGRATION_TEST_SECRETS | dotnet user-secrets set --project ${{ env.integration_tests_shared_project }}

      - name: Install latest .NET 10 SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Build & Run Linux Container Integration Tests
        env:
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          # Retry once on failure to absorb transient infrastructure blips (e.g. container
          # image pulls, Docker networking, or service-container startup races) that can
          # surface as a spurious failure while the code under test is healthy. A
          # retried-but-passing job still emits a ::warning:: so genuine regressions /
          # flake churn stay visible in the UI.
          max_attempts=2
          attempt=1
          while true; do
            set +e
            dotnet test ./tests/Agent/IntegrationTests/ContainerIntegrationTests/ContainerIntegrationTests.csproj \
              --framework net10.0 \
              --filter "Architecture=${{ matrix.arch }}&Distro=${{ matrix.distro }}" \
              --logger "console;verbosity=detailed" \
              --logger "trx;verbosity=detailed" \
              --results-directory ${{ env.test_results_path }}
            exit_code=$?
            set -e
            if [ $exit_code -eq 0 ]; then
              if [ $attempt -gt 1 ]; then
                echo "::warning::Container tests for ${{ matrix.arch }}/${{ matrix.distro }} passed on attempt $attempt after a transient failure. Investigate if this recurs."
              fi
              break
            fi
            if [ $attempt -ge $max_attempts ]; then
              echo "Container tests for ${{ matrix.arch }}/${{ matrix.distro }} failed after $attempt attempt(s) (exit code $exit_code)."
              exit $exit_code
            fi
            echo "Container tests for ${{ matrix.arch }}/${{ matrix.distro }} failed on attempt $attempt (exit code $exit_code); retrying once to absorb a possible transient blip..."
            attempt=$((attempt + 1))
            sleep 10
          done

      - name: Extract payload bytes log from TRX
        if: inputs.aggregate_payload_data == true
        run: |
          PAYLOAD_LOG="${{ env.test_results_path }}/${{ matrix.arch }}_${{ matrix.distro }}_payload_bytes.json"
          echo "Searching for TRX files in: ${{ env.test_results_path }}"

          # Find all TRX files
          TRX_FILES=$(find "${{ env.test_results_path }}" -name "*.trx" -type f)

          if [ -z "$TRX_FILES" ]; then
            echo "No TRX files found"
            echo "{}" > "$PAYLOAD_LOG"
          else
            echo "Found TRX files:"
            echo "$TRX_FILES"

            rows="$(mktemp)"
            while IFS= read -r trx_file; do
              [ -n "$trx_file" ] || continue
              grep -hoE '[A-Za-z0-9_]+:[[:space:]]+[a-z0-9_]+:[[:space:]]+[0-9]+[[:space:]]+bytes' "$trx_file" \
                | sed -E 's/^([A-Za-z0-9_]+):[[:space:]]+([a-z0-9_]+):[[:space:]]+([0-9]+)[[:space:]]+bytes/\1 \2 \3/' >> "$rows" || true
            done <<< "$TRX_FILES"
            jq -Rn '[inputs | split(" ") | {c:.[0], cat:.[1], b:(.[2]|tonumber)}]
              | reduce .[] as $r ({}; .[$r.c][$r.cat] = ((.[$r.c][$r.cat]//0) + $r.b))' "$rows" > "$PAYLOAD_LOG"
            rm -f "$rows"

            if [ "$(cat "$PAYLOAD_LOG")" = "{}" ]; then
              echo "No matching payload byte lines found in TRX files"
            else
              echo "Extracted payload log entries"
            fi
            echo "Content:"
            cat "$PAYLOAD_LOG"
          fi
        shell: bash

      - name: Upload payload bytes log
        if: inputs.aggregate_payload_data == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-container-payload-bytes-${{ matrix.arch }}-${{ matrix.distro }}
          path: ${{ env.test_results_path }}/*_payload_bytes.json
          if-no-files-found: warn

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ContainerTestResults-${{ matrix.arch }}-${{ matrix.distro }}
          path: ${{ env.test_results_path }}

  aggregate-linux-container-payload-logs:
    name: Aggregate Linux Container Test Payload Logs
    needs: [linux-container-tests]
    runs-on: ubuntu-latest
    if: inputs.aggregate_payload_data == true
    permissions:
      actions: write
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download all Linux container payload artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: linux-container-payload-bytes-*
          path: payload-logs/linux-container
          merge-multiple: true

      - name: Combine payload logs
        run: bash build/Scripts/combine-payload-logs.sh payload-logs/linux-container "Linux Container Tests" combined-logs/linux_container_payload_bytes_combined.json
        shell: bash

      - name: Upload combined Linux container payload log
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: combined-linux-container-payload-bytes
          path: combined-logs/linux_container_payload_bytes_*.json
          if-no-files-found: warn

      - name: Delete individual Linux container payload artifacts
        run: |
          # Get all artifacts from this run matching the pattern and delete them
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate \
            --jq '.artifacts[] | select(.name | startswith("linux-container-payload-bytes-")) | "\(.id) \(.name)"' \
            | while read -r artifact_id artifact_name; do
              echo "Deleting artifact: $artifact_name (ID: $artifact_id)"
              gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id \
                && echo "Successfully deleted $artifact_name" \
                || echo "Failed to delete $artifact_name"
            done
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        continue-on-error: true
