name: Fleet Control Schema

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/Agent/NewRelic/Agent/Core/Config/Configuration.xsd'
      - '.fleetControl/schemaGeneration/csharp/**'
      - '.fleetControl/schemas/config.json'
      - '.fleetControl/configurationDefinitions.yml'
      - '.github/workflows/fleet_control_schema.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regenerate-schema:
    name: Regenerate Fleet Control schema
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Detect fork PR
        id: fork
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "is_fork=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_fork=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Regenerate schema
        run: dotnet run --project .fleetControl/schemaGeneration/csharp/GenerateSchema.csproj -c Release -- --ci

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet .fleetControl/schemas/config.json .fleetControl/configurationDefinitions.yml; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail on fork-PR drift
        if: steps.fork.outputs.is_fork == 'true' && steps.drift.outputs.drift == 'true'
        run: |
          echo "::error::Fleet Control schema is out of date. This PR is from a fork, so the workflow can't auto-commit the regenerated files."
          echo "::error::Please run the schema generator locally and commit the result:"
          echo "::error::  dotnet run --project .fleetControl/schemaGeneration/csharp/GenerateSchema.csproj -- --ci"
          echo "::error::  git add .fleetControl/schemas/config.json .fleetControl/configurationDefinitions.yml"
          echo "::error::  git commit -m 'chore(fleet-control): regenerate schema'"
          echo "::error::  git push"
          exit 1

      - name: Commit and push
        if: steps.fork.outputs.is_fork == 'false' && steps.drift.outputs.drift == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .fleetControl/schemas/config.json .fleetControl/configurationDefinitions.yml
          git commit -m "chore(fleet-control): regenerate schema from Configuration.xsd

          Auto-generated by .github/workflows/fleet_control_schema.yml.
          [skip ci]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
